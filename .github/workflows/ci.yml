name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build package
        run: npm run build:pkg

      - name: Typecheck package
        run: npm run typecheck --workspace packages/calculators

      - name: Build demo
        run: npm run build:demo
